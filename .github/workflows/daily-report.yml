name: Daily Intelligence Report

on:
  schedule:
    - cron: '51 23 * * *'  # UTC 23:51 = 北京 07:51（避开整点高峰）
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout engine
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate Morning Report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          XAI_BASE_URL: https://openrouter.ai/api/v1/chat/completions
          XAI_MODEL: x-ai/grok-4-fast
          PRODUCTHUNT_TOKEN: ${{ secrets.PRODUCTHUNT_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python cli.py

      - name: Deliver report to PWA
        env:
          PWA_DEPLOY_TOKEN: ${{ secrets.PWA_DEPLOY_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          REPORT="reports/daily_briefings/Morning_Report_${DATE}.md"
          SUMMARIES="reports/summaries/${DATE}.json"

          if [ ! -f "$REPORT" ]; then
            echo "❌ Report not found: $REPORT"
            ls -la reports/daily_briefings/ 2>/dev/null || echo "Directory does not exist"
            exit 1
          fi

          echo "📄 Report found: $(wc -c < "$REPORT") bytes"

          git clone https://x-access-token:${PWA_DEPLOY_TOKEN}@github.com/77AutumN/intel-briefing-pwa.git /tmp/pwa
          cp "$REPORT" /tmp/pwa/data/daily_briefings/

          # Copy pre-generated summaries if available
          if [ -f "$SUMMARIES" ]; then
            mkdir -p /tmp/pwa/public/data/summaries
            cp "$SUMMARIES" /tmp/pwa/public/data/summaries/
            echo "📝 Summaries found: $(wc -c < "$SUMMARIES") bytes"
          else
            echo "⚠️ No summaries file found, PWA will generate on build"
          fi

          cd /tmp/pwa
          git config user.name "Intel Bot"
          git config user.email "bot@7brief.com"
          git add data/daily_briefings/
          git add -f public/data/summaries/
          git diff --cached --stat

          if git diff --cached --quiet; then
            echo "✅ No changes to commit"
          else
            git commit -m "data: add daily report ${DATE}"
            git push
            echo "✅ Report delivered to intel-briefing-pwa"
          fi

