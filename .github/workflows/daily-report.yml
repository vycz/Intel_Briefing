name: Daily Intelligence Report

on:
  schedule:
    - cron: '51 23 * * *'  # UTC 23:51 = 北京 07:51（避开整点高峰）
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout engine
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate Morning Report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          XAI_BASE_URL: https://openrouter.ai/api/v1/chat/completions
          XAI_MODEL: x-ai/grok-4-fast
          PRODUCTHUNT_TOKEN: ${{ secrets.PRODUCTHUNT_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LLM_PROVIDER: deepseek
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: deepseek-v4-flash
        run: python cli.py

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-report
          path: reports/daily_briefings/*.md

      # Optional: push the generated report to a separate frontend (PWA) repo.
      # Configure repository variable PWA_REPO (e.g. "your-name/your-pwa-repo")
      # and secret PWA_DEPLOY_TOKEN. If either is missing, this step is skipped,
      # so forks without a PWA frontend won't fail here.
      - name: Deliver report to PWA (optional)
        env:
          PWA_DEPLOY_TOKEN: ${{ secrets.PWA_DEPLOY_TOKEN }}
          PWA_REPO: ${{ vars.PWA_REPO }}
        run: |
          if [ -z "$PWA_DEPLOY_TOKEN" ] || [ -z "$PWA_REPO" ]; then
            echo "ℹ️ PWA delivery skipped (set PWA_REPO variable and PWA_DEPLOY_TOKEN secret to enable)."
            exit 0
          fi

          DATE=$(date -u +%Y-%m-%d)
          REPORT="reports/daily_briefings/Morning_Report_${DATE}.md"
          SUMMARIES="reports/summaries/${DATE}.json"

          if [ ! -f "$REPORT" ]; then
            echo "❌ Report not found: $REPORT"
            ls -la reports/daily_briefings/ 2>/dev/null || echo "Directory does not exist"
            exit 1
          fi

          echo "📄 Report found: $(wc -c < "$REPORT") bytes"

          git clone https://x-access-token:${PWA_DEPLOY_TOKEN}@github.com/${PWA_REPO}.git /tmp/pwa
          cp "$REPORT" /tmp/pwa/data/daily_briefings/

          # Copy pre-generated summaries if available
          if [ -f "$SUMMARIES" ]; then
            mkdir -p /tmp/pwa/public/data/summaries
            cp "$SUMMARIES" /tmp/pwa/public/data/summaries/
            echo "📝 Summaries found: $(wc -c < "$SUMMARIES") bytes"
          else
            echo "⚠️ No summaries file found, PWA will generate on build"
          fi

          cd /tmp/pwa
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/daily_briefings/
          # Only stage summaries if they were actually copied (dir may not exist)
          if [ -d public/data/summaries ]; then
            git add -f public/data/summaries/
          fi
          git diff --cached --stat

          if git diff --cached --quiet; then
            echo "✅ No changes to commit"
          else
            git commit -m "data: add daily report ${DATE}"
            git push
            echo "✅ Report delivered to ${PWA_REPO}"
          fi
